<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <meta charset="UTF-8" />
    <title>Aspirantes UD</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
</h:head>

<h:body>

<div class="container mt-5">

    <h:form>
		<h:messages globalOnly="true"
            showSummary="true"
            showDetail="true"
            styleClass="alert alert-danger"/>
        
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center">
                <h4>Registro de Aspirantes</h4>
            </div>
        <div class="card-body">
 
       <div class="mb-3">
                    <label class="form-label">No. Identificación</label>
                    <h:inputText id="id_p"
		             value="#{asp.dto.id_p}"
		             required="true"
		             requiredMessage="El ID es obligatorio"
		             validatorMessage="El ID solo debe contener números"
		             styleClass="form-control">
					    <f:validateRegex pattern="^[0-9]+$"/>
					</h:inputText>
					<h:message for="id_p" styleClass="text-danger"/>
                </div>

               
             <div class="mb-3">
	            <label class="form-label">Nombres</label>
	            <h:inputText id="nombres"
	             value="#{asp.dto.nombres}"
	             required="true"
	             requiredMessage="Los nombres son obligatorios"
	             validatorMessage="El nombre solo debe contener letras"
	             styleClass="form-control">
				    <f:validateRegex pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$"/>
				</h:inputText>
				<h:message for="nombres" styleClass="text-danger"/>
             </div>

           
                <div class="mb-3">
                    <label class="form-label">Apellidos</label>
                    <h:inputText id="apellidos"
		             value="#{asp.dto.apellidos}"
		             required="true"
		             requiredMessage="Los apellidos son obligatorios"
		             validatorMessage="El apellido solo debe contener letras"
		             styleClass="form-control">
				    <f:validateRegex pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$"/>
				</h:inputText>
				<h:message for="apellidos" styleClass="text-danger"/>
                </div>

                
                <div class="mb-3">
	                    <label class="form-label">Teléfono</label>
	                    <h:inputText id="telefono"
			             value="#{asp.dto.telefono}"
			             required="true"
			             requiredMessage="El teléfono es obligatorio"
			             validatorMessage="El teléfono solo debe contener números"
			             styleClass="form-control">
					    <f:validateRegex pattern="^[0-9]+$"/>
					</h:inputText>
					<h:message for="telefono" styleClass="text-danger"/>
                </div>

               
                <div class="mb-3">
                    <label class="form-label">Correo</label>
                   <h:inputText id="correo"
		             value="#{asp.dto.correo}"
		             required="true"
		             requiredMessage="El correo es obligatorio"
		             validatorMessage="Ingrese un correo válido (ej: usuario@gmail.com)"
		             styleClass="form-control">
				    <f:validateRegex pattern="^[\w.-]+@[\w.-]+\.[a-zA-Z]{2,}$"/>
				</h:inputText>
				<h:message for="correo" styleClass="text-danger"/>
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Programa Académico</label>
                    <h:selectOneMenu id="pro_aca" value="#{asp.codPrograma}" required="true"
                                     styleClass="form-select">
                        <f:selectItem itemLabel="-- Seleccione --" noSelectionOption="true"/>
                        <f:selectItems value="#{asp.listaPa}" var="p"
                                       itemValue="#{asp.listaPa.indexOf(p)}"
                                       itemLabel="#{p.nombre_prog}" />
                    </h:selectOneMenu>
                    <h:message for="pro_aca" styleClass="text-danger"/>
                </div>

               
                <div class="d-grid">
                    <h:commandButton value="Registrar"
                                     action="#{asp.registrar}"
                                     styleClass="btn btn-success"/>
                </div>

            </div>
        </div>

       
        <h:panelGroup rendered="#{not empty asp.listaAs}">

            <div class="card shadow-lg mt-5">
                <div class="card-header bg-dark text-white text-center">
                    <h5>Aspirantes Registrados</h5>
                </div>

                <div class="card-body">

                    <h:dataTable value="#{asp.listaAs}"
                                 var="a"
                                 varStatus="status"
                                 styleClass="table table-striped table-bordered text-center">

                        <h:column>
                            <f:facet name="header">N°</f:facet>
                            <h:outputText value="#{status.index + 1}" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">ID</f:facet>
                            <h:outputText value="#{a.id_p}" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">Fecha</f:facet>
                            <h:outputText value="#{a.fecha_reg}" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">Nombres</f:facet>
                            <h:outputText value="#{a.nombres}" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">Apellidos</f:facet>
                            <h:outputText value="#{a.apellidos}" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">Teléfono</f:facet>
                            <h:outputText value="#{a.telefono}" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">Correo</f:facet>
                            <h:outputText value="#{a.correo}" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">Programa</f:facet>
                            <h:outputText value="#{a.pro_acad.nombre_prog}" />
                        </h:column>

                    </h:dataTable>

                </div>
            </div>

        </h:panelGroup>

    </h:form>
        <h:outputLink value="#{request.contextPath}/index.xhtml"
            styleClass="btn btn-secondary">
		    Volver al inicio
		</h:outputLink>

</div>

<footer class="text-center mt-5 p-3 bg-light">
    <h:outputText value="Juan David Calderón Cárdenas - Programación avanzada - Grupo 301 - Universidad Distrital Francisco Jose de Caldas - 2026"/>
</footer>

</h:body>
</html>
